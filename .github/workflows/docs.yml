name: Docs

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          pip install -e ".[all]"
          pip install -r docs/requirements.txt

      - name: Build
        run: python -m sphinx docs/ docs/_build/html -W --keep-going

      # main → deploy to root (latest stable from main) and to /latest/
      - name: Deploy root
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
          keep_files: true

      - name: Deploy /latest/
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
          destination_dir: latest
          keep_files: true

      # release tag → also archive to /vX.Y.Z/ so old docs are never lost
      - name: Archive versioned docs
        if: startsWith(github.ref, 'refs/tags/v')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
          destination_dir: ${{ github.ref_name }}
          keep_files: true
